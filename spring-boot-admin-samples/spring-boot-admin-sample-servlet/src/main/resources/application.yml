---
info:
  scm-url: "@scm.url@"
  build-url: "https://travis-ci.org/codecentric/spring-boot-admin"

logging:
  level:
    ROOT: info
    de.codecentric: info
    org.springframework.web: info
  file:
    name: "target/boot-admin-sample-servlet.log"
  pattern:
    file: "%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(%5p) %clr(${PID}){magenta} %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n%wEx"
  group:
    Spring Boot Admin:
      - de.codecentric.boot.admin.server
      - de.codecentric.boot.admin.client

management:
  info:
    build:
      enabled: true
    env:
      enabled: true
    git:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true
    process:
      enabled: true
    ssl:
      enabled: true
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    auditevents.access: unrestricted
    beans.access: unrestricted
    caches.access: unrestricted
    conditions.access: unrestricted
    configprops.access: unrestricted
    features.access: unrestricted
    flyway.access: unrestricted
    health.access: unrestricted
    heapdump.access: unrestricted
    httpexchanges.access: unrestricted
    info.access: unrestricted
    integrationgraph.access: unrestricted
    liquibase.access: unrestricted
    logfile.access: unrestricted
    loggers.access: unrestricted
    mappings.access: unrestricted
    metrics.access: unrestricted
    prometheus.access: unrestricted
    quartz.access: unrestricted
    refresh.access: unrestricted
    restart.access: unrestricted
    sbom.access: unrestricted
    scheduledtasks.access: unrestricted
    serviceregistry.access: unrestricted
    sessions.access: unrestricted
    shutdown.access: unrestricted
    startup.access: unrestricted
    threaddump.access: unrestricted
    env:
      post:
        enabled: true
      access: unrestricted
    health:
      show-details: ALWAYS

spring:
  application:
    name: spring-boot-admin-sample-servlet
  boot:
    admin:
      monitor:
        info-lifetime: 0s
        info-interval: 10s
      client:
        url: http://localhost:8080
        instance:
          service-host-type: IP
          metadata:
            tags:
              environment: test
              de-service-test-1: A large content
              de-service-test-2: A large content
              de-service-test-3: A large content
              de-service-test-4: A large content
              de-service-test-5: A large content
              de-service-test-6: A large content
            kubectl.kubernetes.io/last-applied-configuration: '{"name":"jvm.threads.peak","description":"The peak live thread count since the Java virtual machine started or peak was reset","baseUnit":"threads","measurements":[{"statistic":"VALUE","value":64.0}],"availableTags":[]}'
  config:
    import: optional:configserver:http://localhost:8888/
  jmx:
    enabled: true
  main:
    lazy-initialization: true
---
# tag::customization-external-views-simple-link[]
spring:
  boot:
    admin:
      ui:
        external-views:
          - label: "🚀" #<1>
            url: "https://codecentric.de" #<2>
            order: 2000 #<3>
# end::customization-external-views-simple-link[]
---
# tag::customization-external-views-dropdown-with-links[]
spring:
  boot:
    admin:
      ui:
        external-views:
          - label: Link w/o children
            children:
              - label: "📖 Docs"
                url: https://codecentric.github.io/spring-boot-admin/current/
              - label: "📦 Maven"
                url: https://search.maven.org/search?q=g:de.codecentric%20AND%20a:spring-boot-admin-starter-server
              - label: "🐙 GitHub"
                url: https://github.com/codecentric/spring-boot-admin
# end::customization-external-views-dropdown-with-links[]
---
# tag::customization-external-views-dropdown-is-link-with-links-as-children[]
spring:
  boot:
    admin:
      ui:
        external-views:
          - label: Link w children
            url: https://codecentric.de  #<1>
            children:
              - label: "📖 Docs"
                url: https://codecentric.github.io/spring-boot-admin/current/
              - label: "📦 Maven"
                url: https://search.maven.org/search?q=g:de.codecentric%20AND%20a:spring-boot-admin-starter-server
              - label: "🐙 GitHub"
                url: https://github.com/codecentric/spring-boot-admin
          - label: "🎅 Is it christmas"
            url: https://isitchristmas.com
            iframe: true
# end::customization-external-views-dropdown-is-link-with-links-as-children[]
---
# tag::customization-view-settings[]
spring:
  boot:
    admin:
      ui:
        view-settings:
          - name: "journal"
            enabled: false
# end::customization-view-settings[]

management:
  endpoint:
    sbom:
      application:
        location: classpath:bom.json
