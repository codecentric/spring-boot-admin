name: Build Pull Request

on:
  pull_request:

concurrency:
  group: build-feature-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    name: build-and-test-pull-request
    strategy:
      matrix:
        os: [ubuntu-latest]

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:

      - name: free disk space
        continue-on-error: true
        run: |
          df -h
          sudo swapoff -a
          sudo rm -f /swapfile
          sudo apt clean
          if [ -n "$(docker image ls -q)" ]; then
            docker rmi -f $(docker image ls -aq) || true
          fi
          df -h

      - uses: actions/checkout@v7

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'
          cache-dependency-path: '**/pom.xml'

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Build with Maven
        run: ./mvnw -B --no-transfer-progress install -P coverage

      - name: Upload surefire reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: surefire-reports
          path: |
            **/target/surefire-reports/*.xml
            **/target/surefire-reports/*.txt
            **/target/surefire-reports/*.dump*
            **/target/surefire-reports/*.out
            **/target/surefire-reports/*.err
          if-no-files-found: warn
          retention-days: 14
